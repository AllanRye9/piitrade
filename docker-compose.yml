# ─── Yot-Presentation – Docker Compose ─────────────────────────────────────
# Spins up the web-based voice-controlled presentation app.
#
# Quick start:
#   docker-compose up          # build + start
#   docker-compose up -d       # detached (background)
#   docker-compose down        # stop and remove containers
#
# The `yot_data` volume persists:
#   • ML learning database  (/app/data/yot_learning.db)
#   • Any other runtime data written to /app/data
# ────────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: yot-presentation:latest
    container_name: yot-presentation
    ports:
      - "5000:5000"
    volumes:
      - yot_data:/app/data
    environment:
      - PORT=5000
      - FLASK_DEBUG=0
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  yot_data:
    driver: local
