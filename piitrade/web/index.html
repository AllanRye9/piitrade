<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder used by the Flutter tool.
    If you change the value of the `href` attribute, you will need to reflect
    this change in several places:
    * In the `flutter_service_worker.js` with the correct `CACHE_NAME` and
      `RESOURCES` keys.
    * In the `FlutterLoader` call in `main.dart` with the correct `assetBase` parameter.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ort Marketplace — Properties, Agriculture &amp; Local Manufacturing">
  <meta name="theme-color" content="#1B5E20">

  <!-- iOS meta tags &amp; icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ort Marketplace">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ort Marketplace</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      /* Match AppTheme.bgLight so there is no colour flash before Flutter renders */
      background-color: #f8f9fa;
    }

    /* Branded loading screen shown while the Flutter engine bootstraps */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #loading-logo {
      width: 80px;
      height: 80px;
      background-color: #1B5E20;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(27, 94, 32, 0.30);
    }

    #loading-logo svg {
      width: 44px;
      height: 44px;
      fill: white;
    }

    #loading-title {
      color: #1B5E20;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    #loading-subtitle {
      color: #6B6B6B;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #C8E6C9;
      border-top-color: #1B5E20;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state shown if Flutter fails to initialise */
    #loading-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
    }

    #loading-error p {
      color: #c62828;
      font-size: 13px;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    #loading-error button {
      margin-top: 4px;
      background: #1B5E20;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #loading-error button:hover {
      background: #2E7D32;
    }
  </style>

  <!-- flutter_bootstrap.js is generated by flutter build web and sets
       _flutter.buildConfig before invoking _flutter.loader.load(). -->
</head>
<body>
  <!-- Visible loading indicator while Flutter bootstraps -->
  <div id="loading">
    <div id="loading-logo">
      <!--
        Simple storefront icon that matches the app icon used on the login
        screen (Icons.storefront_rounded).  Using inline SVG avoids an extra
        network request and ensures it shows immediately.
      -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 4H4v2l1 1v11h14V7l1-1V4zm-2 12H6V8h12v8zm-8-6h4v1h-4zm0 2h4v1h-4zM5 20h14v1H5z"/>
      </svg>
    </div>
    <div id="loading-title">Ort Marketplace</div>
    <div id="loading-subtitle">Properties&nbsp;&bull;&nbsp;Agriculture&nbsp;&bull;&nbsp;Manufacturing</div>
    <div class="spinner" id="loading-spinner"></div>
    <!-- Shown only when Flutter fails to initialise -->
    <div id="loading-error">
      <p id="loading-error-msg">The app failed to load. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </div>
  </div>

  <script>
    function _showLoadError(msg) {
      var spinner = document.getElementById('loading-spinner');
      var errEl   = document.getElementById('loading-error');
      var msgEl   = document.getElementById('loading-error-msg');
      if (spinner) spinner.style.display = 'none';
      if (msgEl && msg) msgEl.textContent = msg;
      if (errEl) errEl.style.display = 'flex';
    }

    // Watchdog: if Flutter hasn't rendered its first frame within this
    // timeout, assume something went wrong (e.g. CanvasKit WASM download
    // stalled) and show the retry button so the user isn't stuck forever.
    var LOAD_TIMEOUT_MS = 30000;
    var watchdog = setTimeout(function () {
      var loadingEl = document.getElementById('loading');
      if (loadingEl && loadingEl.style.display !== 'none') {
        _showLoadError(
          'The app is taking longer than expected to load. ' +
          'This may be due to a slow network. Please retry.'
        );
      }
    }, LOAD_TIMEOUT_MS);

    // Hide the HTML loading screen once Flutter renders its first frame.
    window.addEventListener('flutter-first-frame', function () {
      clearTimeout(watchdog);
      var loadingEl = document.getElementById('loading');
      if (loadingEl) {
        loadingEl.style.display = 'none';
      }
    });

    // Surface unhandled promise rejections during Flutter startup as a visible
    // error rather than a silent blank screen.
    window.addEventListener('unhandledrejection', function (event) {
      var loadingEl = document.getElementById('loading');
      if (loadingEl && loadingEl.style.display !== 'none') {
        clearTimeout(watchdog);
        var reason = event.reason;
        _showLoadError(
          'App startup error: ' +
          (reason && reason.message ? reason.message : String(reason))
        );
      }
    });
  </script>
  <!-- flutter_bootstrap.js is auto-generated by flutter build web.
       It sets _flutter.buildConfig and kicks off the Flutter engine. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
