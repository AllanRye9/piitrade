name: piitrade
description: PiiTrade – AI Forex Signal Hub for Mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP client
  dio: ^5.4.3

  # Local storage
  shared_preferences: ^2.2.3

  # Date & time
  intl: ^0.20.0

  # URL launching
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
