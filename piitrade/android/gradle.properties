org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.enableJetifier=true
# Suppress JVM-target mismatch errors from third-party Flutter plugins (e.g.
# shared_preferences_android, receive_sharing_intent) that hardcode Java 8/11
# in their own build.gradle and get applied AFTER any root-level overrides.
# Official JetBrains recommendation for uncontrollable third-party plugins:
# https://kotlinlang.org/docs/gradle-configure-project.html
kotlin.jvm.target.validation.mode=IGNORE
