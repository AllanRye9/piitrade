<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – PiiTrade</title>
  <link rel="stylesheet" href="/static/css/forex.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📈</text></svg>"/>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ══════════════════════════════════ -->
<header class="fx-header">
  <div class="brand">
    <span>📈</span>
    <a href="/forex" style="color:inherit;text-decoration:none">PiiTrade AI Forex</a>
  </div>
  <nav class="fx-nav">
    <a href="/auth/login">Sign in</a>
  </nav>
</header>

<!-- ═══════════════════════════════ MAIN ════════════════════════════════════ -->
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo">🔒</div>
    <h1 class="auth-title">Set new password</h1>

    {% if error %}
    <div class="auth-alert auth-alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="auth-alert auth-alert-success">
      Password updated successfully! You can now
      <a href="/auth/login" class="auth-link">sign in</a>.
    </div>
    {% elif token %}
    <form class="auth-form" method="post" action="/auth/reset/{{ token }}" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="new_password">New password</label>
        <input
          id="new_password" name="new_password" type="password"
          class="auth-input" autocomplete="new-password"
          placeholder="••••••••" required minlength="8"
        />
        <span class="auth-hint">Minimum 8 characters</span>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="confirm_password">Confirm new password</label>
        <input
          id="confirm_password" name="confirm_password" type="password"
          class="auth-input" autocomplete="new-password"
          placeholder="••••••••" required minlength="8"
        />
      </div>

      <button type="submit" class="auth-btn">Update Password</button>
    </form>
    {% endif %}

    <p class="auth-footer">
      <a href="/auth/login" class="auth-link">← Back to sign in</a>
    </p>
  </div>
</main>

</body>
</html>
