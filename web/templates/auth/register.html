<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account – PiiTrade</title>
  <link rel="stylesheet" href="/static/css/forex.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📈</text></svg>"/>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ══════════════════════════════════ -->
<header class="fx-header">
  <div class="brand">
    <span>📈</span>
    <a href="/forex" style="color:inherit;text-decoration:none">PiiTrade AI Forex</a>
  </div>
  <nav class="fx-nav">
    <a href="/auth/login">Sign in</a>
    <a href="/forex" class="btn-outline">← Back to Hub</a>
  </nav>
</header>

<!-- ═══════════════════════════════ MAIN ════════════════════════════════════ -->
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join PiiTrade for personalised AI signals</p>

    {% if error %}
    <div class="auth-alert auth-alert-error">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="post" action="/auth/register" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="username">Username</label>
        <input
          id="username" name="username" type="text"
          class="auth-input" autocomplete="username"
          placeholder="your_username"
          value="{{ username or '' }}" required minlength="3"
        />
        <span class="auth-hint">3+ chars · letters, numbers, _ - .</span>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="email">Email address</label>
        <input
          id="email" name="email" type="email"
          class="auth-input" autocomplete="email"
          placeholder="you@example.com"
          value="{{ email or '' }}" required
        />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">Password</label>
        <input
          id="password" name="password" type="password"
          class="auth-input" autocomplete="new-password"
          placeholder="••••••••" required minlength="8"
        />
        <span class="auth-hint">Minimum 8 characters</span>
      </div>
      <div class="auth-field">
        <label class="auth-label" for="confirm_password">Confirm password</label>
        <input
          id="confirm_password" name="confirm_password" type="password"
          class="auth-input" autocomplete="new-password"
          placeholder="••••••••" required minlength="8"
        />
      </div>

      <button type="submit" class="auth-btn">Create Account</button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="/auth/login" class="auth-link">Sign in</a>
    </p>
  </div>
</main>

</body>
</html>
