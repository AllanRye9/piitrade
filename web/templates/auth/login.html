<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In – PiiTrade</title>
  <link rel="stylesheet" href="/static/css/forex.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>📈</text></svg>"/>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ══════════════════════════════════ -->
<header class="fx-header">
  <div class="brand">
    <span>📈</span>
    <a href="/forex" style="color:inherit;text-decoration:none">PiiTrade AI Forex</a>
  </div>
  <nav class="fx-nav">
    <a href="/auth/register">Create account</a>
    <a href="/forex" class="btn-outline">← Back to Hub</a>
  </nav>
</header>

<!-- ═══════════════════════════════ MAIN ════════════════════════════════════ -->
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo">📈</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your PiiTrade account</p>

    {% if error %}
    <div class="auth-alert auth-alert-error">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="post" action="/auth/login" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="username">Username</label>
        <input
          id="username" name="username" type="text"
          class="auth-input" autocomplete="username"
          placeholder="your_username"
          value="{{ username or '' }}" required
        />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">
          Password
          <a href="/auth/recover" class="auth-link-inline">Forgot password?</a>
        </label>
        <input
          id="password" name="password" type="password"
          class="auth-input" autocomplete="current-password"
          placeholder="••••••••" required
        />
      </div>

      <button type="submit" class="auth-btn">Sign In</button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="/auth/register" class="auth-link">Create one</a>
    </p>
  </div>
</main>

</body>
</html>
