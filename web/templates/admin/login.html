<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – PiiTrade</title>
  <link rel="stylesheet" href="/static/css/forex.css"/>
  <link rel="stylesheet" href="/static/css/auth.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🛡️</text></svg>"/>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ══════════════════════════════════ -->
<header class="fx-header">
  <div class="brand">
    <span>🛡️</span>
    <span>PiiTrade Admin</span>
  </div>
  <nav class="fx-nav">
    <a href="/forex" class="btn-outline">← Back to Hub</a>
  </nav>
</header>

<!-- ═══════════════════════════════ MAIN ════════════════════════════════════ -->
<main class="auth-main">
  <div class="auth-card">
    <div class="auth-logo">🛡️</div>
    <h1 class="auth-title">Admin Login</h1>
    <p class="auth-subtitle">Restricted access – authorised personnel only</p>

    {% if error %}
    <div class="auth-alert auth-alert-error">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="post" action="/const/login" novalidate>
      <div class="auth-field">
        <label class="auth-label" for="username">Admin username</label>
        <input
          id="username" name="username" type="text"
          class="auth-input" autocomplete="username"
          placeholder="admin_username" required
        />
      </div>
      <div class="auth-field">
        <label class="auth-label" for="password">Password</label>
        <input
          id="password" name="password" type="password"
          class="auth-input" autocomplete="current-password"
          placeholder="••••••••" required
        />
      </div>

      <button type="submit" class="auth-btn">Access Dashboard</button>
    </form>
  </div>
</main>

</body>
</html>
