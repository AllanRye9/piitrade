databases:
  - name: piidb
    plan: free
    databaseName: piidb
    user: piitrade

services:
  - type: web
    name: piitrade
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: "0"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PIIDB
        fromDatabase:
          name: piidb
          property: connectionString
