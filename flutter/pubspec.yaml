name: piitrade
description: PiiTrade – AI & ML backed forex signal subscription service for Android & iOS.
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for the PiiTrade Forex API
  http: ^1.2.1

  # Shared preferences for persisting server URL / settings
  shared_preferences: ^2.2.3

  # Cupertino icons (default Flutter icon pack)
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
